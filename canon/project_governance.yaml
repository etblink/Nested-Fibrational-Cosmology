active_release: L_plus_4
comparison_release: L_plus_5_draft
current_l2_pilots:
- SM
- NS
- RH
current_milestone: v27 CRYST Branch-Successor Pilot
operating_principles:
- Governance metadata is canon-facing theorem infrastructure, not formatting.
- Errors block migration; warnings document drift; traces explain inference.
- Expand canon coverage only when the validation model remains stable.
- The generated corpus may supersede current books only by staged equivalence, audit,
  and release approval; no silent replacement.
- 'Branch-pilot expansion is portfolio-governed: the next pilot is selected by readiness,
  risk, and canon value rather than momentum.'
- SCC successor pilots preserve structural counterfactual capacity only; no phenomenological
  or consciousness endpoint may be inferred.
- CRYST successor pilots preserve conditional diffraction-periodicity-symmetry closure
  while keeping the phase problem open; no phase recovery or full crystallographic
  reconstruction may be inferred.
project_name: NFC Governance Engine
quality_gates:
- description: The governance build must have zero error-severity audit findings.
  id: gate.no_errors
  severity: error
- description: Computed branch postures must reconcile with the active release snapshot.
  id: gate.release_reconciliation
  severity: error
- current_budget: 3
  description: Known warning count may not increase beyond the accepted baseline without
    an explicit decision-log entry. Budget raised to 3 in v31 to accommodate the intentional
    NS stale-posture correction release-vs-computed mismatch warning (documented in
    DECISION_LOG).
  id: gate.warning_budget
  severity: warning
- description: Every active open item must appear in the computed status graph and
    digest.
  id: gate.active_frontier_trace
  severity: error
- description: Every detected release-diff event must have an explicit basis note
    in the target release snapshot.
  id: gate.release_diff_basis
  severity: error
- description: Regression test failures must be zero before the build is accepted.
  id: gate.regression_tests
  severity: error
- description: Canon-import TeX packet and import manifest must be generated.
  id: gate.canon_import_packet
  required_outputs:
  - output/tex/canon_governance_appendix.tex
  - output/tex/canon_governance_appendix_standalone.tex
  - output/reports/canon_import_manifest.json
  - output/tables/canon_import_manifest.md
