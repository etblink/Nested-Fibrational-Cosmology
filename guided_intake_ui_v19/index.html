<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Suite Guided Intake V19</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <h1>Dream Suite</h1>
        <p class="version">Guided Intake V19</p>
        <div id="path-state" class="path-state"></div>
        <div class="sidebar-controls">
          <button class="btn btn-secondary sidebar-btn" onclick="backOne()">Back one step</button>
          <button class="btn btn-ghost sidebar-btn" onclick="restartJourney()">Restart</button>
          <button class="btn btn-ghost sidebar-btn" onclick="showStage('selector')">Switch route</button>
        </div>
        <nav id="progress-nav"></nav>
      </div>
    </aside>
    <main class="content">
      <section id="stage-landing" class="stage active"></section>
      <section id="stage-selector" class="stage"></section>
      <section id="stage-contract" class="stage"></section>
      <section id="stage-kernel" class="stage"></section>
      <section id="stage-doctrine" class="stage"></section>
      <section id="stage-antiref" class="stage"></section>
      <section id="stage-source" class="stage"></section>
      <section id="stage-branchmap" class="stage"></section>
      <section id="stage-clusters" class="stage"></section>
      <section id="stage-clusterdetail" class="stage"></section>
      <section id="stage-clustercompare" class="stage"></section>
      <section id="stage-recovery" class="stage"></section>
      <section id="stage-route" class="stage"></section>
      <section id="stage-archive" class="stage"></section>
      <section id="stage-branchdetail" class="stage"></section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
